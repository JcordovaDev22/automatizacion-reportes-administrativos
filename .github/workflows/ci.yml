name: Python CI Pipeline

on:
  push:
    branches: [ main, developer, staging ]
  pull_request:
    branches: [ main, developer, staging ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=term
      
      - name: Run all tests (Unit, Integration, E2E)
        run: |
          # Esto ejecutará todos los archivos que empiecen con test_ en la carpeta tests/
          pytest tests/ -v --cov=src --cov-report=term --cov-report=html
      
      - name: Run all tests
      run: |
        # 1. Iniciar la aplicación en segundo plano
        python app.py & 
        
        # 2. Esperar unos segundos a que el servidor esté listo
        sleep 5 
        
        # 3. Ejecutar los tests (Pytest detectará todos los test_*.py)
        pytest tests/ -v --cov=src --cov-report=html